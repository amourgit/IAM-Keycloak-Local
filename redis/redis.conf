# =============================================================================
# EIGEN IAM — Configuration Redis :: Keycloak Local
# Sessions actives EIGEN — interrogées par le Gateway Master à chaque requête
# =============================================================================

# --- Réseau ---
bind 0.0.0.0
protected-mode yes
port 6379
tcp-keepalive 300

# --- Sécurité ---
# Le mot de passe est passé via la commande Docker (--requirepass)
# Ne pas définir ici pour éviter de le committer

# --- Performance ---
tcp-backlog 511
timeout 0
databases 1

# --- Mémoire ---
maxmemory 512mb
# LRU : expirer les clés les moins récemment utilisées quand la mémoire est pleine
# Idéal pour des sessions avec TTL
maxmemory-policy allkeys-lru
maxmemory-samples 5

# --- Persistance ---
# Save si au moins 1 changement en 60s (sécurité minimale)
save 60 1
save 300 10
save 900 100

# En cas d'erreur de sauvegarde RDB, accepter les writes quand même
# (on préfère la disponibilité à la durabilité pour les sessions)
stop-writes-on-bgsave-error no

rdbcompression yes
rdbchecksum yes
dbfilename eigen-sessions.rdb
dir /data

# --- Logs ---
loglevel warning
logfile ""

# --- Slowlog ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Limites ---
maxclients 100
hz 10

# --- Pas d'AOF (sessions = données éphémères, RDB suffit) ---
appendonly no
